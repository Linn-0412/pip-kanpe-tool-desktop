<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#050505">
    <title>PiP カンペ</title>
    <link rel="stylesheet" href="./styles.css?v=0.1.0">
    <script type="module" src="./pip-window.js?v=0.1.0"></script>
  </head>
  <body class="pip-body desktop-pip-body">
    <main id="pip-shell" class="pip-shell desktop-pip-shell">
      <img id="pip-image" alt="">
      <div id="pip-empty" class="pip-empty">メイン画面から画像を送信中...</div>
      <div id="pip-controls" class="pip-controls separate bottom">
        <button id="pip-prev" class="pip-button" type="button" title="前の画像">←</button>
        <div id="pip-label" class="pip-label"></div>
        <button id="pip-next" class="pip-button" type="button" title="次の画像">→</button>
      </div>
    </main>
  </body>
</html>
